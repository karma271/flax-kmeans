dataset_id: "synthetic_blobs_v1"
kind: "synthetic"
generator: "gaussian_blobs"
random_seed: 42

sweep:
  n_samples: [1000, 10000, 100000]
  n_features: [8, 32, 128]
  n_clusters: [4, 8, 16]
  cluster_std: [0.3, 0.8, 1.5]
  imbalance_ratio: [1.0, 2.0, 5.0]
  noise_fraction: [0.0, 0.01, 0.05]

preprocessing:
  standardize: true

notes: "Primary synthetic benchmark sweep for scaling and stability."
